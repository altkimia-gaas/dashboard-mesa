async function callAI(prompt,apiKey){
  const key=apiKey||"AIzaSyDm579PVp9tRaR2jNXzbTE3-sS8F7x4xDA";
  const TARGET=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  const BODY=JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1000}});
  try{
    const r=await fetch(TARGET,{method:"POST",headers:{"Content-Type":"application/json"},body:BODY});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    const t=d.candidates?.[0]?.content?.parts?.[0]?.text;
    if(t) return t; throw new Error("Sin respuesta");
  }catch(e1){
    try{
      const r2=await fetch("https://corsproxy.io/?"+encodeURIComponent(TARGET),{method:"POST",headers:{"Content-Type":"application/json"},body:BODY});
      const d2=await r2.json();
      if(d2.error) throw new Error(d2.error.message);
      const t2=d2.candidates?.[0]?.content?.parts?.[0]?.text;
      if(t2) return t2; throw new Error("Sin respuesta");
    }catch(e2){throw new Error("No se pudo conectar con la IA. Revisa tu clave o conexión a internet.");}
  }
}

/* ══════ MOTOR DE DOCUMENTOS ══════ */
function useDocData(clientId, docId, updateClient){
  const getVal = useCallback((fieldId) => {
    return updateClient._clientRef?.docs?.[docId]?.[fieldId] || "";
  }, [clientId, docId]);

  const setVal = useCallback((fieldId, value) => {
    updateClient(c => ({
      ...c,
      docs: { ...(c.docs||{}), [docId]: { ...(c.docs?.[docId]||{}), [fieldId]: value } }
    }));
  }, [docId, updateClient]);

  return { getVal, setVal };
}

function DocModal({ docId, mode, client, updateClient, onClose, addToast }){
  const def = DOCS_DEF[docId];
  if(!def) return null;
  const isExample = mode === "ejemplo";
  const [localData, setLocalData] = useState(() => {
    if(isExample) return def.example || {};
    return client.docs?.[docId] || {};
  });
  const [saved, setSaved] = useState(false);

  const getValue = (fieldId) => {
    if(isExample) return def.example?.[fieldId] || "";
    return localData[fieldId] || "";
  };

  const handleChange = (fieldId, value) => {
    if(isExample) return;
    setLocalData(p => ({ ...p, [fieldId]: value }));
  };

  const handleSave = () => {
    updateClient(c => ({ ...c, docs: { ...(c.docs||{}), [docId]: localData } }));
    setSaved(true);
    addToast("Documento guardado", "success");
    setTimeout(() => setSaved(false), 2000);
  };

  const handleExport = () => {
    const lines = [`${def.title}\n${"=".repeat(def.title.length)}\n${def.subtitle}\n`];
    def.sections.forEach(sec => {
      lines.push(`\n${sec.title}`);
      lines.push("-".repeat(sec.title.length));
      sec.fields.forEach(field => {
        const val = getValue(field.id);
        lines.push(`\n${field.label}`);
        lines.push(val || "(sin completar)");
      });
    });
    const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`${def.id}_${mode}.txt`; a.click();
    URL.revokeObjectURL(url);
    addToast("Documento exportado", "success");
  };

  const completedFields = def.sections.reduce((acc,sec) => {
    sec.fields.forEach(f => { if(getValue(f.id)) acc++; });
    return acc;
  }, 0);
  const totalFields = def.sections.reduce((acc,sec) => acc + sec.fields.length, 0);
  const pct = Math.round(completedFields/totalFields*100);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(8,11,18,.9)",zIndex:2000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
      <div style={{width:"100%",maxWidth:720,animation:"fadeIn .25s ease",position:"relative"}}>
        {/* Header */}
        <div style={{background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:"12px 12px 0 0",padding:"18px 20px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>{def.icon}</span>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <span style={{fontSize:15,fontWeight:600,color:B.text}}>{def.title}</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:isExample?"rgba(255,152,0,.12)":"rgba(33,150,243,.12)",color:isExample?B.amber:B.blueLight,border:`0.5px solid ${isExample?"rgba(255,152,0,.3)":"rgba(33,150,243,.3)"}`,fontFamily:"DM Mono"}}>{isExample?"EJEMPLO":"PLANTILLA"}</span>
              </div>
              <div style={{fontSize:11,color:B.muted}}>{def.subtitle}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {!isExample&&<div style={{fontSize:10,fontFamily:"DM Mono",color:B.muted}}>{pct}% completado</div>}
            {!isExample&&<button onClick={handleSave} style={{padding:"6px 14px",background:saved?B.green:B.blue,border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"background .2s"}}>{saved?"✓ Guardado":"Guardar"}</button>}
            <button onClick={handleExport} style={{padding:"6px 12px",background:"transparent",border:`0.5px solid ${B.border}`,borderRadius:6,color:B.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Exportar</button>
            <button onClick={onClose} style={{background:"none",border:"none",color:B.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:4}}>×</button>
          </div>
        </div>

        {/* Barra de progreso */}
        {!isExample&&(
          <div style={{height:3,background:B.border,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:B.blue,transition:"width .4s"}}/>
          </div>
        )}

        {/* Aviso ejemplo */}
        {isExample&&(
          <div style={{background:"rgba(255,152,0,.06)",border:`0.5px solid rgba(255,152,0,.2)`,borderLeft:`3px solid ${B.amber}`,padding:"10px 16px",fontSize:12,color:B.muted}}>
            Este es un ejemplo con datos de <strong style={{color:B.text}}>Bodega Los Andes</strong> — una empresa ficticia del rubro vitivinícola. Úsalo como referencia para completar tu propia plantilla.
          </div>
        )}

        {/* Secciones */}
        <div style={{background:B.bg2,border:`0.5px solid ${B.border}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"20px"}}>
          {def.sections.map((sec, si) => (
            <div key={sec.id} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:sec.desc?6:12}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"rgba(33,150,243,.15)",border:`0.5px solid rgba(33,150,243,.3)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:10,fontFamily:"DM Mono",color:B.blue,fontWeight:600}}>{si+1}</span>
                </div>
                <span style={{fontSize:13,fontWeight:600,color:B.text}}>{sec.title}</span>
              </div>
              {sec.desc&&<p style={{fontSize:12,color:B.muted,lineHeight:1.6,marginBottom:12,paddingLeft:32}}>{sec.desc}</p>}
              {sec.fields.map(field => (
                <div key={field.id} style={{marginBottom:14,paddingLeft:32}}>
                  <div style={{fontSize:11,color:B.muted,marginBottom:6,letterSpacing:".3px"}}>{field.label}</div>
                  {field.type==="textarea"
                    ? <textarea
                        value={getValue(field.id)}
                        onChange={e=>handleChange(field.id,e.target.value)}
                        onBlur={!isExample?handleSave:undefined}
                        placeholder={isExample?"":field.placeholder}
                        rows={field.rows||3}
                        readOnly={isExample}
                        style={{background:isExample?"rgba(255,152,0,.04)":B.bg3,border:`0.5px solid ${isExample?"rgba(255,152,0,.2)":B.border}`,color:isExample?B.muted:B.text,cursor:isExample?"default":"text"}}
                      />
                    : <input
                        type="text"
                        value={getValue(field.id)}
                        onChange={e=>handleChange(field.id,e.target.value)}
                        onBlur={!isExample?handleSave:undefined}
                        placeholder={isExample?"":field.placeholder}
                        readOnly={isExample}
                        style={{background:isExample?"rgba(255,152,0,.04)":B.bg3,border:`0.5px solid ${isExample?"rgba(255,152,0,.2)":B.border}`,color:isExample?B.muted:B.text}}
                      />
                  }
                </div>
              ))}
              {si < def.sections.length-1 && <div style={{height:"0.5px",background:B.border,marginTop:8,marginLeft:32}}/>}
            </div>
          ))}

          {!isExample&&(
            <div style={{display:"flex",gap:8,marginTop:8,paddingTop:16,borderTop:`0.5px solid ${B.border}`}}>
              <button onClick={handleSave} style={{flex:1,padding:"10px 0",background:B.blue,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                {saved?"✓ Guardado":"Guardar documento"}
              </button>
              <button onClick={handleExport} style={{padding:"10px 16px",background:"transparent",border:`0.5px solid ${B.border}`,borderRadius:8,color:B.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Exportar .txt</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function RadarSVG({modules}){
  const cx=100,cy=100,r=68,n=6;
  const pts=modules.map((m,i)=>{const v=(m.progress||0)/100,a=(Math.PI*2*i/n)-Math.PI/2;return[cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v];});
  const lbls=["M","E","S","A","P","C"];
  return(<svg viewBox="0 0 200 200" style={{width:"100%",height:"100%"}}>
    {[1,2,3,4].map(ring=>{const p=Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+Math.cos(a)*r*ring/4},${cy+Math.sin(a)*r*ring/4}`;}).join(" ");return<polygon key={ring} points={p} fill="none" stroke={B.border} strokeWidth="1"/>;
    })}
    {Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke={B.border} strokeWidth="1"/>;
    })}
    <polygon points={pts.map(p=>p.join(",")).join(" ")} fill="rgba(33,150,243,.14)" stroke={B.blue} strokeWidth="1.5"/>
    {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="3" fill={B.blue}/>)}
    {lbls.map((l,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<text key={i} x={cx+Math.cos(a)*(r+16)} y={cy+Math.sin(a)*(r+16)} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill={B.muted} fontFamily="DM Mono">{l}</text>;})}
  </svg>);
}

function ResourcesTab({mod, client, updateClient, addToast}){
  const [openDoc, setOpenDoc] = useState(null); // {docId, mode}

  // Map module to doc ids
  const moduleDocMap = {
    m1:["m1_d1","m1_d2"], m2:["m2_d1","m2_d2"],
    m3:["m3_d1","m3_d2"], m4:["m4_d1","m4_d2"],
    m5:["m5_d1","m5_d2"], m6:["m6_d1","m6_d2"]
  };
  const docIds = moduleDocMap[mod.id] || [];
  const card = {background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8};

  const getDocProgress = (docId) => {
    const def = DOCS_DEF[docId];
    if(!def) return 0;
    const saved = client.docs?.[docId] || {};
    const total = def.sections.reduce((a,s)=>a+s.fields.length,0);
    const filled = def.sections.reduce((a,s)=>a+s.fields.filter(f=>saved[f.id]).length,0);
    return total>0?Math.round(filled/total*100):0;
  };

  return(
    <div>
      {openDoc && (
        <DocModal
          docId={openDoc.docId}
          mode={openDoc.mode}
          client={client}
          updateClient={updateClient}
          onClose={()=>setOpenDoc(null)}
          addToast={addToast}
        />
      )}

      {/* Documentos */}
      <Eyebrow style={{marginBottom:12}}>Documentos de la etapa</Eyebrow>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
        {docIds.map(docId => {
          const def = DOCS_DEF[docId];
          if(!def) return null;
          const pct = getDocProgress(docId);
          return(
            <div key={docId} style={{...card,padding:0,overflow:"hidden"}}>
              <div style={{padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <span style={{fontSize:22,flexShrink:0}}>{def.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:B.text,marginBottom:2}}>{def.title}</div>
                    <div style={{fontSize:11,color:B.muted}}>{def.subtitle}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>

                  </div>
                </div>
                {/* Progress bar */}
                <div style={{height:3,background:B.border,borderRadius:2,marginBottom:12,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:pct===100?B.green:B.blue,borderRadius:2,transition:"width .4s"}}/>
                </div>
                {/* Botones */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button
                    onClick={()=>setOpenDoc({docId,mode:"plantilla"})}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",background:B.blue,border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}

                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" style={{width:11,height:11}}><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/></svg>

  const [diag,setDiag]=useState(mod.lastDiag?{show:true,loading:false,text:mod.lastDiag}:{show:false,loading:false,text:""});
  const gaasActivos=client.gaas.filter(g=>g.active&&(GAAS_MODULE_MAP[g.id]||[]).includes(mod.id));
  const updateMod=(updates)=>{updateClient(c=>({...c,modules:c.modules.map(m=>m.id!==mod.id?m:{...m,...updates})}));};
  const markDone=(idx)=>{
    updateClient(c=>{
      const modules=c.modules.map(m=>{
        if(m.id!==mod.id)return m;
        const steps=m.steps.map(s=>({...s}));
        steps[idx]={...steps[idx],state:"done",doneAt:new Date().toISOString()};
        if(steps[idx+1]&&steps[idx+1].state==="pending")steps[idx+1]={...steps[idx+1],state:"active"};
        const done=steps.filter(s=>s.state==="done").length;
        return{...m,steps,progress:Math.round(done/steps.length*100)};
      });
      const idx2=modules.findIndex(m=>m.id===mod.id);
      if(modules[idx2].progress===100&&idx2+1<modules.length)modules[idx2+1]={...modules[idx2+1],unlocked:true};
      const events=[...c.events,{date:new Date().toLocaleDateString("es-CL"),text:`${mod.phase} — paso completado`}].slice(-30);
      return{...c,modules,events};
    });
    addToast("Paso completado","success");
  };
  const handleAI=async()=>{
    setAi({show:true,loading:true,text:""});
    const done=mod.steps.filter(s=>s.state==="done").map(s=>s.title).join(", ");
    const svcs=gaasActivos.map(g=>g.name).join(", ");
    const p=`Eres asesor de negocios de ALTKimia. Empresa: "${client.nombre}" (${client.sector||"sin rubro"}). Etapa: "${mod.name}". Avance: ${mod.progress||0}%. Pasos completados: ${done||"ninguno"}. Servicios activos: ${svcs||"ninguno"}. En lenguaje simple: 1) Cómo va el proceso (2 líneas). 2) Lo más importante a hacer ahora. 3) Qué pasa si no se hace. Máximo 100 palabras. Sin términos técnicos.`;
    try{const t=await callAI(p,apiKey);setAi({show:true,loading:false,text:t});updateMod({lastAI:t,lastAIDate:new Date().toISOString()});addToast("Análisis guardado","success");}
    catch(e){setAi({show:true,loading:false,text:e.message});addToast(e.message,"error");}
  };
  const handleDiag=async()=>{
    setDiag({show:true,loading:true,text:""});
    const matScore=quizSel!=null?quizSel+1:null;
    const scaleStr=Object.entries(scale).map(([k,v])=>`pregunta ${parseInt(k)+1}: ${v}/5`).join(", ");
    const p=`Asesor ALTKimia. Empresa: "${client.nombre}". Etapa: "${mod.name}". Respuesta diagnóstico: opción ${matScore||"sin responder"} de 4. Auto-evaluaciones: ${scaleStr||"ninguna"}. Comentarios: "${comment||"ninguno"}". En lenguaje simple: 1) Cómo está la empresa en esta etapa. 2) Las 2 cosas más urgentes. 3) Los 3 primeros pasos concretos esta semana. Máximo 130 palabras. Sin tecnicismos.`;
    try{const t=await callAI(p,apiKey);setDiag({show:true,loading:false,text:t});updateMod({lastDiag:t,lastDiagDate:new Date().toISOString(),diagQuizSel:quizSel,diagScale:scale,diagComment:comment});addToast("Evaluación guardada","success");}
    catch(e){setDiag({show:true,loading:false,text:e.message});addToast(e.message,"error");}
  };
  const saveComment=()=>{updateMod({diagComment:comment,diagQuizSel:quizSel,diagScale:scale});addToast("Guardado","success");};
  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:"14px 16px"};
  const btn=(p)=>({padding:"8px 18px",borderRadius:6,fontSize:12,fontFamily:"inherit",fontWeight:600,cursor:"pointer",border:`0.5px solid ${p?B.blue:B.border}`,background:p?B.blue:"transparent",color:p?"#fff":B.muted});
  const matLabels=["Recién comenzando","En desarrollo","Bien encaminado","Referente"];
  const maturity=quizSel!=null?matLabels[quizSel]:null;
  return(<div style={{animation:"fadeIn .25s ease"}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          <Badge>{mod.phase}</Badge>
          {(mod.progress||0)>0?<span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:"rgba(33,150,243,.1)",color:B.blueLight,border:"0.5px solid rgba(33,150,243,.25)",fontFamily:"DM Mono"}}>En curso</span>
           :mod.unlocked?<span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:`rgba(30,45,74,.3)`,color:B.muted,fontFamily:"DM Mono"}}>Sin comenzar</span>
           :<span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:"rgba(239,83,80,.1)",color:B.red,fontFamily:"DM Mono"}}>Bloqueada</span>}
          {maturity&&<span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:"rgba(33,150,243,.08)",color:B.blueLight,border:"0.5px solid rgba(33,150,243,.2)",fontFamily:"DM Mono"}}>{maturity}</span>}
          {gaasActivos.map(g=><span key={g.id} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"rgba(76,175,80,.1)",color:B.green,border:"0.5px solid rgba(76,175,80,.25)"}}>{g.name}</span>)}
        </div>
        <h1 style={{fontSize:19,fontWeight:600,color:B.text,marginBottom:4}}>{mod.name}</h1>
        <p style={{fontSize:13,color:B.muted}}>{mod.foco}</p>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <div style={{fontSize:28,fontWeight:700,color:B.blue,fontFamily:"DM Mono"}}>{mod.progress||0}%</div>
        <div style={{fontSize:10,color:B.muted,textTransform:"uppercase",letterSpacing:"1px",fontFamily:"DM Mono"}}>completado</div>
        <div style={{height:3,background:B.border,borderRadius:2,marginTop:6,width:80,overflow:"hidden"}}><div style={{height:"100%",width:`${mod.progress||0}%`,background:B.blue,borderRadius:2,transition:"width .5s"}}/></div>
      </div>
    </div>
    {!mod.unlocked&&!isAdmin&&(<div style={{...card,textAlign:"center",padding:"2.5rem",border:"0.5px solid rgba(239,83,80,.2)"}}>
      <div style={{fontSize:32,marginBottom:12}}>🔒</div>
      <div style={{fontSize:15,fontWeight:500,color:B.text,marginBottom:8}}>Esta etapa está bloqueada</div>
      <div style={{fontSize:13,color:B.muted,lineHeight:1.6}}>Para avanzar aquí primero tienes que completar la etapa anterior al 100%.<br/>El proceso MESA está diseñado para construirse paso a paso.</div>
    </div>)}
    {(mod.unlocked||isAdmin)&&(<>
    <div style={{display:"flex",gap:0,background:B.bg3,padding:3,borderRadius:8,marginBottom:20,width:"fit-content",border:`0.5px solid ${B.border}`}}>
      {[["pasos","Pasos"],["recursos","Materiales"],["diagnostico","Evaluación"],["dashboard","Resultados"]].map(([t,lbl])=>(<button key={t} onClick={()=>setTab(t)} style={{padding:"6px 16px",borderRadius:5,fontSize:12,cursor:"pointer",fontWeight:tab===t?500:400,color:tab===t?B.text:B.muted,background:tab===t?B.bg4:"transparent",border:"none",fontFamily:"inherit",transition:"all .15s"}}>{lbl}</button>))}
    </div>
    {gaasActivos.length>0&&tab==="pasos"&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(76,175,80,.05)",border:"0.5px solid rgba(76,175,80,.2)",borderRadius:6,marginBottom:16,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:B.green}}>Servicios activos en esta etapa:</span>
      {gaasActivos.map(g=><span key={g.id} style={{fontSize:11,color:B.muted,background:B.bg3,padding:"2px 8px",borderRadius:4}}>{g.name}</span>)}
    </div>)}
    {tab==="pasos"&&(<div>
      <div style={{background:"rgba(33,150,243,.04)",border:`0.5px solid ${B.border}`,borderLeft:`2px solid ${B.blue}`,borderRadius:"0 8px 8px 0",padding:"12px 16px",fontSize:13,color:B.muted,lineHeight:1.7,marginBottom:20}}>{mod.nota}</div>
      {mod.steps.map((s,i)=>(<div key={s.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",background:B.bg2,border:`0.5px solid ${s.state==="done"?"rgba(33,150,243,.3)":s.state==="active"?"rgba(33,150,243,.15)":B.border}`,borderRadius:8,marginBottom:8,transition:"all .15s"}}>
        <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,flexShrink:0,fontFamily:"DM Mono",background:s.state==="done"?"rgba(33,150,243,.2)":s.state==="active"?"rgba(33,150,243,.1)":B.bg3,color:s.state==="done"?B.blue:s.state==="active"?B.blueLight:B.muted,border:`0.5px solid ${s.state==="done"?B.blue:s.state==="active"?"rgba(33,150,243,.3)":B.border}`}}>
          {s.state==="done"?<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:10,height:10}}><polyline points="1,7 5,10 11,2"/></svg>:`0${i+1}`}
        </div>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:s.state==="pending"?B.muted:B.text,marginBottom:2}}>{s.title}</div><div style={{fontSize:11,color:B.border}}>{s.desc}</div>{s.doneAt&&<div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",marginTop:3}}>Completado el {new Date(s.doneAt).toLocaleDateString("es-CL")}</div>}</div>
        {s.state==="active"&&<button style={btn(true)} onClick={()=>markDone(i)}>Completar</button>}
      </div>))}
      <div style={{display:"flex",gap:8,marginTop:20}}><button style={btn(true)} onClick={handleAI}>Ver análisis IA</button><button style={btn(false)}>Exportar</button></div>
      {ai.show&&<AIPanel loading={ai.loading} text={ai.text}/>}
    </div>)}
    {tab==="recursos"&&(<ResourcesTab mod={mod} client={client} updateClient={updateClient} addToast={addToast}/>)}
    {tab==="diagnostico"&&(<div>
      {mod.lastDiagDate&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(33,150,243,.06)",border:"0.5px solid rgba(33,150,243,.2)",borderRadius:6,marginBottom:16,fontSize:12,color:B.muted}}><div style={{width:6,height:6,borderRadius:"50%",background:B.green,flexShrink:0}}/>Evaluación guardada · {new Date(mod.lastDiagDate).toLocaleDateString("es-CL")}{maturity&&<span style={{color:B.blueLight}}>· {maturity}</span>}</div>)}
      <Eyebrow style={{marginBottom:10}}>Pregunta de evaluación</Eyebrow>
      <div style={{...card,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:500,lineHeight:1.6,color:B.text,marginBottom:14}}>{mod.quiz.q}</div>
        {mod.quiz.opts.map((o,i)=>(<div key={i} onClick={()=>{setQuizSel(i);updateMod({diagQuizSel:i});}} style={{padding:"10px 14px",border:`0.5px solid ${quizSel===i?B.blue:B.border}`,borderRadius:6,cursor:"pointer",fontSize:13,color:quizSel===i?B.blueLight:B.muted,background:quizSel===i?"rgba(33,150,243,.08)":B.bg3,marginBottom:6,transition:"all .15s",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:16,height:16,borderRadius:"50%",border:`1px solid ${quizSel===i?B.blue:B.muted}`,background:quizSel===i?B.blue:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{quizSel===i&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}</div>
          <span style={{flex:1}}>{o}</span><span style={{fontSize:10,fontFamily:"DM Mono",color:B.border}}>{i+1}/4</span>
        </div>))}
      </div>
      <Eyebrow style={{marginBottom:10}}>¿Cómo lo ves tú? (1 = muy mal, 5 = muy bien)</Eyebrow>
      {["Claridad sobre el foco del negocio","Capacidad del equipo para ejecutar","Acceso a información para decidir"].map((q,qi)=>(<div key={qi} style={{...card,marginBottom:8}}><div style={{fontSize:13,color:B.muted,marginBottom:10}}>{q}</div><div style={{display:"flex",gap:6}}>{[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>{const ns={...scale,[qi]:n};setScale(ns);updateMod({diagScale:ns});}} style={{flex:1,height:32,borderRadius:6,border:`0.5px solid ${scale[qi]===n?B.blue:B.border}`,background:scale[qi]===n?B.blue:B.bg3,cursor:"pointer",fontSize:12,fontFamily:"DM Mono",color:scale[qi]===n?"#fff":B.muted,transition:"all .15s"}}>{n}</button>))}</div></div>))}
      <div style={{marginTop:16,marginBottom:4}}><Eyebrow style={{marginBottom:8}}>Comentarios adicionales</Eyebrow><textarea value={comment} onChange={e=>setComment(e.target.value)} onBlur={saveComment} placeholder="Escribe aquí cualquier información importante sobre esta etapa..."/><div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",marginTop:4}}>Se guarda automáticamente</div></div>
      <div style={{display:"flex",gap:8,marginTop:12}}><button style={btn(true)} onClick={handleDiag}>Obtener recomendaciones IA</button><button style={btn(false)} onClick={saveComment}>Guardar</button></div>
      {diag.show&&<AIPanel loading={diag.loading} text={diag.text}/>}
    </div>)}
    {tab==="dashboard"&&(<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>{mod.kpis.map((k,i)=>(<div key={i} style={card}><Eyebrow style={{marginBottom:8}}>{k.label}</Eyebrow><div style={{fontSize:26,fontWeight:700,fontFamily:"DM Mono",color:B.blue}}>{k.val>0?k.val:"—"}</div><div style={{height:3,background:B.border,borderRadius:2,marginTop:10,overflow:"hidden"}}><div style={{height:"100%",width:`${k.val}%`,background:`linear-gradient(90deg,${B.blueDark},${B.blue})`,borderRadius:2,transition:"width .8s"}}/></div></div>))}</div>
      <div style={{...card,marginBottom:12}}><Eyebrow style={{marginBottom:10}}>Avance de esta etapa</Eyebrow><div style={{height:130}}><MiniChart mod={mod}/></div></div>
      <div style={card}><Eyebrow style={{marginBottom:10}}>Antes y después del acompañamiento</Eyebrow>{mod.kpis.map((k,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"0.5px solid rgba(30,45,74,.5)"}}><div style={{flex:1,fontSize:12,color:B.muted}}>{k.label}</div><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:10,color:B.border,fontFamily:"DM Mono"}}>Antes</span><div style={{width:48,height:3,background:B.border,borderRadius:2}}><div style={{height:"100%",width:`${Math.max(5,k.val-18)}%`,background:B.border,borderRadius:2}}/></div><span style={{fontSize:10,color:B.border,fontFamily:"DM Mono"}}>Ahora</span><div style={{width:48,height:3,background:B.border,borderRadius:2}}><div style={{height:"100%",width:`${k.val}%`,background:B.blue,borderRadius:2}}/></div></div><div style={{fontSize:12,fontWeight:600,fontFamily:"DM Mono",color:B.blue,minWidth:40,textAlign:"right"}}>{k.val>0?`+${Math.round(k.val*.35)}%`:"—"}</div></div>))}</div>
    </div>)}
    </>)}
  </div>);
}

function GaaSView({client,updateClient,apiKey,addToast}){
  const [ai,setAi]=useState({show:true,loading:false,text:"Activa los servicios que tiene contratados esta empresa. Los servicios activos aparecerán vinculados en cada etapa del proceso."});
  const gaas=client.gaas;
  const setGaas=(fn)=>updateClient(c=>({...c,gaas:fn(c.gaas)}));
  const toggle=(id)=>{setGaas(g=>g.map(x=>x.id===id?{...x,active:!x.active}:x));addToast("Servicio actualizado","success");};
  const toggleInd=(gId,idx)=>setGaas(g=>g.map(x=>{if(x.id!==gId||!x.active)return x;const sel=x.indicators.filter(i=>i.sel).length;if(!x.indicators[idx].sel&&sel>=3){addToast("Máximo 3 indicadores por servicio","error");return x;}const indicators=x.indicators.map((ind,i)=>i===idx?{...ind,sel:!ind.sel}:ind);return{...x,indicators};}));
  const handleAnalyze=async()=>{
    setAi({show:true,loading:true,text:""});
    const activos=gaas.filter(g=>g.active);
    const desc=activos.map(g=>{const si=g.indicators.filter(i=>i.sel).map(i=>`${i.name}: ${i.val}`).join("; ");return`${g.name} (${si})`;}).join(" | ");
    const p=`Asesor ALTKimia. Empresa: "${client.nombre}". Servicios contratados: ${desc||"ninguno"}. En lenguaje simple: ¿tiene sentido este mix de servicios?, ¿falta algo importante?, da 2 recomendaciones concretas. Máximo 100 palabras.`;
    try{const t=await callAI(p,apiKey);setAi({show:true,loading:false,text:t});addToast("Análisis guardado","success");}
    catch(e){setAi({show:true,loading:false,text:e.message});addToast(e.message,"error");}
  };
  const btn=(p)=>({padding:"8px 18px",borderRadius:6,fontSize:12,fontFamily:"inherit",fontWeight:600,cursor:"pointer",border:`0.5px solid ${p?B.blue:B.border}`,background:p?B.blue:"transparent",color:p?"#fff":B.muted});
  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:14};
  const activos=gaas.filter(g=>g.active).length;
  return(<div style={{animation:"fadeIn .25s ease"}}>
    <div style={{marginBottom:24}}><Eyebrow style={{marginBottom:6}}>Servicios contratados</Eyebrow><h1 style={{fontSize:22,fontWeight:600,color:B.text,marginBottom:4}}>¿Qué servicios tiene esta empresa?</h1><p style={{fontSize:13,color:B.muted}}>{activos} servicio{activos!==1?"s":""} activo{activos!==1?"s":""} · Los servicios activos aparecen en cada etapa del proceso</p></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:16}}>
      {gaas.map(g=>(<div key={g.id} style={{...card,borderTop:`2px solid ${g.active?B.blue:B.border}`,opacity:g.active?1:.55,transition:"all .2s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div><div style={{fontSize:13,fontWeight:500,color:g.active?B.text:B.muted}}>{g.name}</div>{g.active&&<div style={{fontSize:10,color:B.green,fontFamily:"DM Mono",marginTop:2}}>Activo en {(GAAS_MODULE_MAP[g.id]||[]).length} etapas</div>}</div>
          <div onClick={()=>toggle(g.id)} style={{width:34,height:19,borderRadius:10,cursor:"pointer",background:g.active?B.blue:B.border,position:"relative",transition:"background .2s",flexShrink:0}}><div style={{width:13,height:13,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:g.active?18:3,transition:"left .2s"}}/></div>
        </div>
        {g.active&&g.indicators.map((ind,i)=>(<div key={i} onClick={()=>toggleInd(g.id,i)} title={ind.desc} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:ind.sel?"rgba(33,150,243,.08)":B.bg3,borderRadius:6,border:`0.5px solid ${ind.sel?"rgba(33,150,243,.35)":B.border}`,cursor:"pointer",marginBottom:5,transition:"all .15s"}}>
          <div style={{flex:1,fontSize:11,color:B.muted,lineHeight:1.3}}>{ind.name}</div>
          <div style={{fontSize:12,fontWeight:600,fontFamily:"DM Mono",color:ind.sel?B.blue:B.muted,margin:"0 6px"}}>{ind.val}</div>
          <div style={{width:15,height:15,borderRadius:4,border:`1px solid ${ind.sel?B.blue:B.border}`,background:ind.sel?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ind.sel&&<svg viewBox="0 0 10 10" fill="none" stroke="#fff" strokeWidth="2" style={{width:8,height:8}}><polyline points="1,5 4,8 9,2"/></svg>}</div>
        </div>))}
        {g.active&&<div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",marginTop:6}}>SELECCIONA LOS INDICADORES · MAX. 3</div>}
      </div>))}
    </div>
    {ai.show&&<AIPanel loading={ai.loading} text={ai.text}/>}
    <div style={{display:"flex",gap:8,marginTop:16}}><button style={btn(true)} onClick={handleAnalyze}>Analizar servicios con IA</button></div>
  </div>);
}

function Dashboard({client,updateClient,onNav,apiKey,addToast}){
  const modules=client.modules;const gaas=client.gaas;
  const global=Math.round(modules.reduce((a,m)=>a+(m.progress||0),0)/modules.length);
  const [ai,setAi]=useState({show:false,loading:false,text:""});
  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:"14px 16px"};
  const handleGlobalAI=async()=>{
    setAi({show:true,loading:true,text:""});
    const progStr=modules.map(m=>`${m.phase}(${m.progress||0}%)`).join(", ");
    const svcs=gaas.filter(g=>g.active).map(g=>g.name).join(", ");
    const p=`Asesor ALTKimia. Empresa: "${client.nombre}" (${client.sector||""}). Avance: ${global}%. Etapas: ${progStr}. Servicios: ${svcs||"ninguno"}. En lenguaje simple: 1) Cómo va el proceso en general. 2) Lo más importante para avanzar. 3) El riesgo más importante a evitar. Máximo 120 palabras. Sin tecnicismos.`;
    try{const t=await callAI(p,apiKey);setAi({show:true,loading:false,text:t});addToast("Análisis guardado","success");}
    catch(e){setAi({show:true,loading:false,text:e.message});addToast(e.message,"error");}
  };
  const gaasActivos=gaas.filter(g=>g.active);
  return(<div style={{animation:"fadeIn .25s ease"}}>
    <div style={{marginBottom:24}}><Eyebrow style={{marginBottom:6}}>Resumen general</Eyebrow><h1 style={{fontSize:22,fontWeight:600,color:B.text,marginBottom:4}}>{client.nombre}</h1><p style={{fontSize:13,color:B.muted}}>{client.sector||"—"} · {client.etapa||"—"} · Responsable: {client.responsable||"—"}</p></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
      {[{ey:"Avance total",val:`${global}%`,d:"del proceso MESA",ok:true},{ey:"Etapas en curso",val:`${modules.filter(m=>(m.progress||0)>0&&(m.progress||0)<100).length}`,d:"de 6 etapas",ok:null},{ey:"Servicios activos",val:`${gaasActivos.length}`,d:"contratados",ok:null},{ey:"Salud del negocio",val:`${client.health[client.health.length-1]?.val||"—"}`,d:"mejorando",ok:true}].map((m,i)=>(<div key={i} style={card}><Eyebrow style={{marginBottom:8}}>{m.ey}</Eyebrow><div style={{fontSize:28,fontWeight:700,fontFamily:"DM Mono",color:B.blue,letterSpacing:"-1px"}}>{m.val}</div><div style={{fontSize:11,marginTop:4,color:m.ok===true?B.green:m.ok===false?B.red:B.muted}}>{m.d}</div></div>))}

function simpleHash(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}
  return h.toString(36);
}

const ADMIN_EMAIL="avillalobos@altkimia.com";
const ADMIN_HASH=simpleHash("Bandida1970$$");
const ADMIN_NOMBRE="Antonio Villalobos";

const USERS_KEY="altkimia_users_v1";
const SESSION_KEY="altkimia_session_v1";

function loadUsers(){try{const r=localStorage.getItem(USERS_KEY);return r?JSON.parse(r):{};}catch{return{};}}
function saveUsers(u){try{localStorage.setItem(USERS_KEY,JSON.stringify(u));}catch{}}
function loadSession(){try{const r=sessionStorage.getItem(SESSION_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function saveSession(s){try{sessionStorage.setItem(SESSION_KEY,JSON.stringify(s));}catch{}}
function clearSession(){try{sessionStorage.removeItem(SESSION_KEY);}catch{}}

function authLogin(email,password){
  const e=email.trim().toLowerCase();const h=simpleHash(password.trim());
  if(e===ADMIN_EMAIL&&h===ADMIN_HASH){
    const s={email:e,nombre:ADMIN_NOMBRE,rol:"admin",loginAt:Date.now()};
    saveSession(s);return{ok:true,session:s};
  }
  const users=loadUsers();const user=users[e];
  if(user&&user.passHash===h){
    const s={email:e,nombre:user.nombre,rol:"user",empresa:user.empresa,loginAt:Date.now()};
    saveSession(s);return{ok:true,session:s};
  }
  return{ok:false,error:"Correo o contraseña incorrectos"};
}

function authRegister(email,password,nombre,empresa,sector,etapa){
  const e=email.trim().toLowerCase();
  if(!e||!password.trim()||!nombre.trim()||!empresa.trim()) return{ok:false,error:"Completa todos los campos obligatorios (*)"}; 
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) return{ok:false,error:"Ingresa un correo válido"};
  if(password.trim().length<6) return{ok:false,error:"La contraseña debe tener al menos 6 caracteres"};
  if(e===ADMIN_EMAIL) return{ok:false,error:"Correo no disponible"};
  const users=loadUsers();
  if(users[e]) return{ok:false,error:"Este correo ya está registrado. Usa 'Ingresar'."};
  users[e]={email:e,passHash:simpleHash(password.trim()),nombre:nombre.trim(),empresa:empresa.trim(),sector,etapa,rol:"user",createdAt:new Date().toISOString()};
  saveUsers(users);
  const s={email:e,nombre:nombre.trim(),rol:"user",empresa:empresa.trim(),loginAt:Date.now()};
  saveSession(s);
  return{ok:true,session:s,newUser:{email:e,nombre:nombre.trim(),empresa:empresa.trim(),sector,etapa}};
}

function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);
  const [loading,setLoading]=useState(false);

  // Use refs for all inputs — avoids focus loss on re-render in Babel standalone
  const rEmail=useRef(null);
  const rPass=useRef(null);
  const rNombre=useRef(null);
  const rEmpresa=useRef(null);
  const rSector=useRef(null);
  const rEtapa=useRef(null);

  const getVals=()=>({
    email:(rEmail.current?.value||"").trim(),
    password:(rPass.current?.value||"").trim(),
    nombre:(rNombre.current?.value||"").trim(),
    empresa:(rEmpresa.current?.value||"").trim(),
    sector:(rSector.current?.value||"").trim(),
    etapa:(rEtapa.current?.value||"").trim()
  });

  const clearInputs=()=>{
    [rEmail,rPass,rNombre,rEmpresa,rSector,rEtapa].forEach(r=>{if(r.current)r.current.value="";});
  };

  const handleSubmit=async()=>{
    const v=getVals();
    setLoading(true);setError("");
    await new Promise(r=>setTimeout(r,200));
    if(mode==="login"){
      const res=authLogin(v.email,v.password);
      if(res.ok){onAuth(res.session);}
      else{setError(res.error);setShake(true);setTimeout(()=>setShake(false),500);}
    } else {
      const res=authRegister(v.email,v.password,v.nombre,v.empresa,v.sector,v.etapa);
      if(res.ok){onAuth(res.session,res.newUser);}
      else{setError(res.error);setShake(true);setTimeout(()=>setShake(false),500);}
    }
    setLoading(false);
  };

  const onKey=e=>{if(e.key==="Enter")handleSubmit();};

  const inp=(ref,lbl,ph,type="text")=>(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,color:B.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"1px"}}>{lbl}</div>
      <input ref={ref} type={type} defaultValue="" placeholder={ph} onKeyDown={onKey}
        autoComplete={type==="password"?"current-password":type==="email"?"email":"off"}
        style={{background:B.bg3,border:`0.5px solid ${B.border}`,borderRadius:6,color:B.text,fontFamily:"Inter,sans-serif",fontSize:13,padding:"9px 12px",outline:"none",width:"100%",transition:"border-color .15s"}}
        onFocus={e=>e.target.style.borderColor="rgba(33,150,243,.5)"}
        onBlur={e=>e.target.style.borderColor=B.border}
      />
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:B.bg1,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif",padding:"24px 16px",position:"relative",overflowY:"auto"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,rgba(33,150,243,.06) 1px,transparent 1px)",backgroundSize:"32px 32px",pointerEvents:"none"}}/>
      <div style={{width:400,maxWidth:"100%",position:"relative",zIndex:1,animation:"fadeIn .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:8}}>
            <svg width="38" height="38" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill={B.blue}/><circle cx="46" cy="56" r="24" fill="none" stroke="#fff" strokeWidth="10"/><line x1="70" y1="32" x2="70" y2="80" stroke="#fff" strokeWidth="10" strokeLinecap="round"/><circle cx="46" cy="56" r="6" fill="rgba(255,255,255,.85)"/><circle cx="70" cy="32" r="6" fill="rgba(255,255,255,.6)"/></svg>
            <span style={{fontFamily:"Inter",fontWeight:700,fontSize:24,letterSpacing:"-0.5px"}}><span style={{color:B.blue}}>alt</span><span style={{color:B.text}}>kimia</span></span>
          </div>
          <div style={{fontSize:12,color:B.muted}}>Plataforma MESA · {mode==="login"?"Acceso":"Crear cuenta"}</div>
        </div>

        <div style={{display:"flex",background:B.bg3,padding:3,borderRadius:8,marginBottom:16,border:`0.5px solid ${B.border}`}}>
          {[["login","Ingresar"],["register","Crear cuenta"]].map(([m,lbl])=>(
            <button key={m} onClick={()=>{setMode(m);setError("");clearInputs();}}
              style={{flex:1,padding:"8px 0",borderRadius:5,fontSize:13,fontWeight:mode===m?600:400,color:mode===m?B.text:B.muted,background:mode===m?B.bg4:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{lbl}</button>
          ))}
        </div>

        <div style={{background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:12,padding:"1.5rem",animation:shake?"shake .4s ease":undefined}}>
          <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`}</style>
          {mode==="register"&&inp(rNombre,"Nombre completo *","Tu nombre y apellido")}
          {inp(rEmail,"Correo electrónico *","tu@empresa.com","email")}
          {inp(rPass,"Contraseña *","Mínimo 6 caracteres","password")}
          {mode==="register"&&(<>
            <div style={{height:"0.5px",background:B.border,margin:"14px 0"}}/>
            <div style={{fontSize:11,color:B.blue,marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>Tu empresa</div>
            {inp(rEmpresa,"Nombre de la empresa *","Ej: Bodega Los Andes")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <div style={{fontSize:11,color:B.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"1px"}}>Rubro</div>
                <input ref={rSector} type="text" defaultValue="" placeholder="Ej: Agrotech" onKeyDown={onKey}
                  style={{background:B.bg3,border:`0.5px solid ${B.border}`,borderRadius:6,color:B.text,fontFamily:"Inter,sans-serif",fontSize:13,padding:"9px 12px",outline:"none",width:"100%"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:B.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"1px"}}>Etapa</div>
                <input ref={rEtapa} type="text" defaultValue="" placeholder="Ej: PyME" onKeyDown={onKey}
                  style={{background:B.bg3,border:`0.5px solid ${B.border}`,borderRadius:6,color:B.text,fontFamily:"Inter,sans-serif",fontSize:13,padding:"9px 12px",outline:"none",width:"100%"}}/>
              </div>
            </div>
          </>)}
          {error&&<div style={{fontSize:12,color:B.red,margin:"12px 0 0",textAlign:"center",padding:"8px",background:"rgba(239,83,80,.08)",borderRadius:6,border:"0.5px solid rgba(239,83,80,.2)"}}>{error}</div>}
          <button onClick={handleSubmit} disabled={loading}
            style={{width:"100%",padding:"11px 0",background:loading?B.blueDark:B.blue,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:600,cursor:loading?"default":"pointer",fontFamily:"inherit",letterSpacing:".3px",marginTop:16,transition:"background .15s"}}>
            {loading?"...":(mode==="login"?"Ingresar":"Crear cuenta y comenzar")}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:B.border,fontFamily:"DM Mono"}}>
          {mode==="login"?"Sin cuenta — usa Crear cuenta arriba":"¿Ya tienes cuenta? — usa Ingresar arriba"}
        </div>
      </div>
    </div>
  );
}

function AdminUsersPanel({onClose}){
  const [users,setUsers]=useState(()=>loadUsers());
  const [search,setSearch]=useState("");
  const [confirm,setConfirm]=useState(null);
  const deleteUser=(email)=>{const u={...users};delete u[email];saveUsers(u);setUsers(u);setConfirm(null);};
  const filtered=Object.values(users).filter(u=>
    u.email.toLowerCase().includes(search.toLowerCase())||
    (u.nombre||"").toLowerCase().includes(search.toLowerCase())||
    (u.empresa||"").toLowerCase().includes(search.toLowerCase())
  );
  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:"14px 16px"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(8,11,18,.92)",zIndex:3000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
      <div style={{width:"100%",maxWidth:680,animation:"fadeIn .25s ease"}}>
        <div style={{background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:"12px 12px 0 0",padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"2.5px",color:B.blue,textTransform:"uppercase",marginBottom:3}}>Administración</div>
            <div style={{fontSize:16,fontWeight:600,color:B.text}}>Gestión de usuarios registrados</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:B.muted,cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
        </div>
        <div style={{background:B.bg2,border:`0.5px solid ${B.border}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"20px"}}>
          {/* Admin fijo */}
          <div style={{...card,borderTop:`2px solid ${B.blue}`,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:B.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0}}>A</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:B.text}}>{ADMIN_NOMBRE}</div>
                <div style={{fontSize:11,color:B.muted}}>{ADMIN_EMAIL}</div>
              </div>
              <span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:"rgba(33,150,243,.15)",color:B.blue,border:`0.5px solid rgba(33,150,243,.3)`,fontFamily:"DM Mono"}}>ADMIN</span>
            </div>
          </div>
          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{l:"Usuarios registrados",v:Object.keys(users).length},{l:"Con empresa",v:Object.values(users).filter(u=>u.empresa).length},{l:"Este mes",v:Object.values(users).filter(u=>new Date(u.createdAt).getMonth()===new Date().getMonth()).length}].map((s,i)=>(
              <div key={i} style={card}>
                <div style={{fontSize:10,color:B.muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:4}}>{s.l}</div>
                <div style={{fontSize:22,fontWeight:700,fontFamily:"DM Mono",color:B.blue}}>{s.v}</div>
              </div>
            ))}
          </div>
          {/* Search */}
          <div style={{marginBottom:14}}>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre, correo o empresa..."/>
          </div>
          {/* List */}
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"2rem",color:B.border,fontSize:13}}>
              {Object.keys(users).length===0?"Aún no hay usuarios registrados":"Sin resultados"}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(u=>(
                <div key={u.email} style={card}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(33,150,243,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:B.blue,flexShrink:0}}>
                      {(u.nombre||"U").charAt(0).toUpperCase()}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:B.text}}>{u.nombre}</div>
                      <div style={{fontSize:11,color:B.muted}}>{u.email}</div>
                      {u.empresa&&<div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",marginTop:2}}>{u.empresa}{u.sector?" · "+u.sector:""}{u.etapa?" · "+u.etapa:""}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <div style={{fontSize:10,color:B.border,fontFamily:"DM Mono"}}>{new Date(u.createdAt).toLocaleDateString("es-CL")}</div>
                      {confirm===u.email?(
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>deleteUser(u.email)} style={{padding:"4px 10px",background:B.red,border:"none",borderRadius:5,color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Confirmar</button>
                          <button onClick={()=>setConfirm(null)} style={{padding:"4px 10px",background:"transparent",border:`0.5px solid ${B.border}`,borderRadius:5,color:B.muted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
                        </div>
                      ):(
                        <button onClick={()=>setConfirm(u.email)} style={{padding:"4px 8px",background:"transparent",border:`0.5px solid rgba(239,83,80,.3)`,borderRadius:5,color:B.red,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Eliminar</button>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Root(){
  const [session,setSession]=useState(()=>loadSession());
  const [newUserData,setNewUserData]=useState(null);
  const handleAuth=(sess,newUser=null)=>{setSession(sess);if(newUser)setNewUserData(newUser);};
  const handleLogout=()=>{clearSession();setSession(null);setNewUserData(null);};
  if(!session) return <AuthScreen onAuth={handleAuth}/>;
  return <App session={session} newUserData={newUserData} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
