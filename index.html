/* ══════════════════════════════════════════
   AI CALL
══════════════════════════════════════════ */
async function callAI(prompt, apiKey) {
  const key = apiKey || "AIzaSyDqrvBEvPr2cVOe4_J-6EE7VOLwlV44i1U";
  const TARGET = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  const BODY = JSON.stringify({
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { maxOutputTokens: 1000 }
  });

  // Intento 1: llamada directa
  try {
    const res = await fetch(TARGET, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: BODY
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    const txt = d.candidates?.[0]?.content?.parts?.[0]?.text;
    if (txt) return txt;
    throw new Error("Respuesta vacía");
  } catch(e1) {
    // Intento 2: proxy CORS (allorigins)
    try {
      const encoded = encodeURIComponent(TARGET);
      const proxyUrl = `https://api.allorigins.win/raw?url=${encoded}`;
      const res2 = await fetch(proxyUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: BODY
      });
      const d2 = await res2.json();
      if (d2.error) throw new Error(d2.error.message);
      const txt2 = d2.candidates?.[0]?.content?.parts?.[0]?.text;
      if (txt2) return txt2;
      throw new Error("Sin respuesta del proxy");
    } catch(e2) {
      // Intento 3: proxy alternativo (corsproxy.io)
      const res3 = await fetch("https://corsproxy.io/?" + encodeURIComponent(TARGET), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: BODY
      });
      const d3 = await res3.json();
      if (d3.error) throw new Error(d3.error.message);
      const txt3 = d3.candidates?.[0]?.content?.parts?.[0]?.text;
      if (txt3) return txt3;
      throw new Error("Todos los proxies fallaron. Verifica tu conexión a internet.");
    }
  }
}

function Toast({msg,type="success",onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const col=type==="success"?B.green:type==="error"?B.red:B.blue;
  return(
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,background:B.bg3,border:`0.5px solid ${col}`,borderLeft:`3px solid ${col}`,borderRadius:8,padding:"12px 16px",fontSize:13,color:B.text,display:"flex",alignItems:"center",gap:10,animation:"toastIn .3s ease",boxShadow:"0 8px 32px rgba(0,0,0,.4)",minWidth:260}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/>
      {msg}
      <div onClick={onClose} style={{marginLeft:"auto",cursor:"pointer",color:B.muted,fontSize:16,lineHeight:1}}>×</div>
    </div>
  );
}

      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:B.bg3,borderColor:B.border,borderWidth:1,titleColor:B.text,bodyColor:B.muted}},
        scales:{
          x:{grid:{color:"rgba(30,45,74,.5)"},ticks:{color:B.muted,font:{size:10,family:"DM Mono"}}},
          y:{grid:{color:"rgba(30,45,74,.5)"},ticks:{color:B.muted,font:{size:10,family:"DM Mono"}},min:4,max:10,stepSize:1}
        }
      }
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[JSON.stringify(history)]);
  return <canvas ref={ref}/>;
}

function MiniChart({mod}){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    const data=[20,35,50,mod.progress,mod.progress>0?Math.min(100,mod.progress+5):null,null];
    chart.current=new Chart(ref.current,{
      type:"line",
      data:{labels:["M1","M2","M3","M4","M5","M6"],datasets:[{data,borderColor:B.blue,backgroundColor:"rgba(33,150,243,.06)",fill:true,tension:.4,pointRadius:3,pointBackgroundColor:B.blue}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:"rgba(30,45,74,.4)"},ticks:{color:B.muted,font:{size:10,family:"DM Mono"}}},y:{grid:{color:"rgba(30,45,74,.4)"},ticks:{color:B.muted,font:{size:10,family:"DM Mono"}},min:0,max:100}}
      }
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[mod.id,mod.progress]);
  return <canvas ref={ref}/>;
}

function RadarSVG({modules}){
  const cx=100,cy=100,r=68,n=6;
  const pts=modules.map((m,i)=>{const v=m.progress/100,a=(Math.PI*2*i/n)-Math.PI/2;return[cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v];});
  return(
    <svg viewBox="0 0 200 200" style={{width:"100%",height:"100%"}}>
      {[1,2,3,4].map(ring=>{const p=Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+Math.cos(a)*r*ring/4},${cy+Math.sin(a)*r*ring/4}`;}).join(" ");return<polygon key={ring} points={p} fill="none" stroke={B.border} strokeWidth="1"/>;
      })}
      {Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke={B.border} strokeWidth="1"/>;
      })}
      <polygon points={pts.map(p=>p.join(",")).join(" ")} fill="rgba(33,150,243,.14)" stroke={B.blue} strokeWidth="1.5"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="3" fill={B.blue}/>)}
      {modules.map((m,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<text key={i} x={cx+Math.cos(a)*(r+16)} y={cy+Math.sin(a)*(r+16)} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={B.muted} fontFamily="DM Mono">{m.id.toUpperCase()}</text>;})}
    </svg>
  );
}

/* ══════════════════════════════════════════
   PLAN DE ACCIÓN EXPORT
══════════════════════════════════════════ */
function exportPlan(modules,settings,gaas){
  const lines=[];
  lines.push(`PLAN DE ACCIÓN MESA — ${settings.empresa||"Empresa"}`);
  lines.push(`Generado: ${new Date().toLocaleDateString("es-CL")} · Responsable: ${settings.responsable||"—"}`);
  lines.push("══════════════════════════════════════════");
  lines.push("");
  modules.forEach(m=>{
    lines.push(`[${m.id.toUpperCase()}] ${m.phase} — ${m.name} (${m.progress||0}%)`);
    const pendientes=m.steps.filter(s=>s.state!=="done");
    if(pendientes.length){
      pendientes.forEach(s=>lines.push(`  · ${s.title}: ${s.desc}`));
    } else {
      lines.push("  ✓ Módulo completado");
    }
    lines.push("");
  });
  lines.push("SERVICIOS GaaS ACTIVOS:");
  gaas.filter(g=>g.active).forEach(g=>{
    lines.push(`  · ${g.name}`);
    g.indicators.filter(i=>i.sel).forEach(i=>lines.push(`    — ${i.name}: ${i.val}`));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`MESA_PlanAccion_${Date.now()}.txt`;a.click();
  URL.revokeObjectURL(url);
}

function ModuleView({mod,modules,setModules,apiKey,addToast,addEvent}){
  const [tab,setTab]=useState("pasos");
  const [quizSel,setQuizSel]=useState(mod.diagQuizSel!=null?mod.diagQuizSel:null);
  const [scale,setScale]=useState(mod.diagScale||{});
  const [comment,setComment]=useState(mod.diagComment||"");
  const [ai,setAi]=useState(mod.lastAI?{show:true,loading:false,text:mod.lastAI}:{show:false,loading:false,text:""});
  const [diag,setDiag]=useState(mod.lastDiag?{show:true,loading:false,text:mod.lastDiag}:{show:false,loading:false,text:""});

  // Persistir cambios de diagnóstico en módulo
  const persistDiag=useCallback((updates)=>{
    setModules(prev=>prev.map(m=>m.id!==mod.id?m:{...m,...updates}));
  },[mod.id,setModules]);

  const markDone=(idx)=>{
    setModules(prev=>prev.map(m=>{
      if(m.id!==mod.id)return m;
      const steps=m.steps.map(s=>({...s}));
      steps[idx]={...steps[idx],state:"done",completedAt:new Date().toISOString()};
      if(steps[idx+1]&&steps[idx+1].state==="pending") steps[idx+1]={...steps[idx+1],state:"active"};
      const done=steps.filter(s=>s.state==="done").length;
      const progress=Math.round(done/steps.length*100);
      // Desbloquear siguiente módulo si completado al 100%
      const updatedMods=[...prev];
      const mIdx=updatedMods.findIndex(x=>x.id===m.id);
      if(progress===100&&mIdx+1<updatedMods.length){
        updatedMods[mIdx+1]={...updatedMods[mIdx+1],unlocked:true};
      }
      updatedMods[mIdx]={...updatedMods[mIdx],steps,progress};
      addEvent(`${m.id.toUpperCase()} — Paso completado: ${steps[idx].title}`);
      return updatedMods[mIdx];
    }));
    addToast("Paso completado y guardado","success");
  };

  const handleAI=async()=>{
    
    setAi({show:true,loading:true,text:""});
    const done=mod.steps.filter(s=>s.state==="done").map(s=>s.title).join(", ");
    const matScore=mod.diagQuizSel!=null?(mod.diagQuizSel+1):null;
    const p=`Eres consultor senior de ALTKimia, especializado en metodología MESA (Mapear, Estructurar, Sistematizar, Escalar, Autonomizar). Empresa: "${mod.settings?.empresa||"cliente"}". Módulo: "${mod.name}" — Fase ${mod.phase} — Avance: ${mod.progress||0}%. Pasos completados: ${done||"ninguno"}. Score de madurez auto-declarado: ${matScore||"sin datos"}. Entrega: 1) Diagnóstico ejecutivo en 2 líneas. 2) Recomendación más crítica. 3) Riesgo si no se actúa. Directo, sin bullet points, tono ALTKimia: ejecutivo y sin humo. Máximo 120 palabras.`;
    try{
      const t=await callAI(p,apiKey);
      setAi({show:true,loading:false,text:t});
      persistDiag({lastAI:t,lastAIDate:new Date().toISOString()});
      addToast("Análisis IA guardado","success");
    }catch(e){
      setAi({show:true,loading:false,text:`Error: ${e.message}`});
      addToast("Error al conectar con IA","error");
    }
  };

  const handleDiag=async()=>{
    
    const matScore=quizSel!=null?quizSel+1:null;
    const scaleVals=Object.entries(scale).map(([k,v])=>`dim${parseInt(k)+1}:${v}`).join(", ");
    setDiag({show:true,loading:true,text:""});
    const p=`Eres experto en metodología MESA de ALTKimia. Módulo: "${mod.name}" (${mod.foco}), fase ${mod.phase}. Nivel declarado en diagnóstico: opción ${matScore||"no respondida"} de 4. Auto-evaluaciones (escala 1-5): ${scaleVals||"no completadas"}. Contexto adicional: "${comment||"ninguno"}". Entrega: 1) Nivel de madurez actual (1 párrafo). 2) Las 2 brechas más críticas. 3) Los 3 primeros pasos concretos esta semana. Máximo 150 palabras. Segunda persona, directo, sin jerga.`;
    try{
      const t=await callAI(p,apiKey);
      setDiag({show:true,loading:false,text:t});
      persistDiag({lastDiag:t,lastDiagDate:new Date().toISOString(),diagQuizSel:quizSel,diagScale:scale,diagComment:comment});
      addToast("Diagnóstico procesado y guardado","success");
    }catch(e){
      setDiag({show:true,loading:false,text:`Error: ${e.message}`});
      addToast("Error al procesar diagnóstico","error");
    }
  };

  const saveComment=()=>{persistDiag({diagComment:comment,diagQuizSel:quizSel,diagScale:scale});addToast("Diagnóstico guardado","success");};

  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:"14px 16px"};
  const btn=(primary)=>({padding:"8px 18px",borderRadius:6,fontSize:12,fontFamily:"inherit",fontWeight:600,cursor:"pointer",letterSpacing:".3px",border:`0.5px solid ${primary?B.blue:B.border}`,background:primary?B.blue:"transparent",color:primary?"#fff":B.muted,transition:"all .15s"});

    <div style={{animation:"fadeIn .25s ease"}}>

        <div>

            {mod.status==="active"||mod.progress>0
              ?<span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:"rgba(33,150,243,.1)",color:B.blueLight,border:"0.5px solid rgba(33,150,243,.25)",fontFamily:"DM Mono"}}>En progreso</span>

function GaaSView({gaas,setGaas,apiKey,addToast}){
  const [ai,setAi]=useState({show:true,loading:false,text:"Activa o desactiva servicios y selecciona los indicadores clave para obtener análisis de tu mix GaaS."});
  const toggle=(id)=>{setGaas(g=>g.map(x=>x.id===id?{...x,active:!x.active}:x));};
  const toggleInd=(gId,idx)=>setGaas(g=>g.map(x=>{
    if(x.id!==gId||!x.active)return x;
    const sel=x.indicators.filter(i=>i.sel).length;
    if(!x.indicators[idx].sel&&sel>=3){addToast("Máximo 3 indicadores por servicio","error");return x;}
    const indicators=x.indicators.map((ind,i)=>i===idx?{...ind,sel:!ind.sel}:ind);
    return{...x,indicators};
  }));
  const handleAnalyze=async()=>{
    
    setAi({show:true,loading:true,text:""});
    const active=gaas.filter(g=>g.active);
    const desc=active.map(g=>{const si=g.indicators.filter(i=>i.sel).map(i=>`${i.name}: ${i.val}`).join("; ");return`${g.name} (${si})`;}).join(" | ");
    const p=`Consultor GaaS senior ALTKimia. Servicios activos: ${desc}. Analiza el mix, identifica sinergias y brechas. Da 2 recomendaciones estratégicas concretas. Directo, ejecutivo, sin humo. Máximo 120 palabras.`;
    try{const t=await callAI(p,apiKey);setAi({show:true,loading:false,text:t});addToast("Análisis GaaS guardado","success");}
    catch(e){setAi({show:true,loading:false,text:`Error: ${e.message}`});addToast("Error IA","error");}
  };
  const btn=(p)=>({padding:"8px 18px",borderRadius:6,fontSize:12,fontFamily:"inherit",fontWeight:600,cursor:"pointer",letterSpacing:".3px",border:`0.5px solid ${p?B.blue:B.border}`,background:p?B.blue:"transparent",color:p?"#fff":B.muted});
  const card={background:B.bg2,border:`0.5px solid ${B.border}`,borderRadius:8,padding:14};
  return(
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{marginBottom:24}}>
        <Eyebrow style={{marginBottom:6}}>Configuración</Eyebrow>
        <h1 style={{fontSize:22,fontWeight:600,letterSpacing:"-0.5px",color:B.text,marginBottom:4}}>Servicios GaaS activos</h1>
        <p style={{fontSize:13,color:B.muted}}>Selecciona servicios e indicadores — máx. 3 por servicio</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:16}}>
        {gaas.map(g=>(
          <div key={g.id} style={{...card,borderTop:`2px solid ${g.active?B.blue:B.border}`,opacity:g.active?1:.55,transition:"all .2s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:500,color:g.active?B.text:B.muted}}>{g.name}</div>
              <div onClick={()=>toggle(g.id)} style={{width:34,height:19,borderRadius:10,cursor:"pointer",background:g.active?B.blue:B.border,position:"relative",transition:"background .2s",flexShrink:0}}>
                <div style={{width:13,height:13,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:g.active?18:3,transition:"left .2s"}}/>
              </div>
            </div>
            {g.indicators.map((ind,i)=>(
              <div key={i} onClick={()=>toggleInd(g.id,i)} title={ind.desc} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:ind.sel&&g.active?"rgba(33,150,243,.08)":B.bg3,borderRadius:6,border:`0.5px solid ${ind.sel&&g.active?"rgba(33,150,243,.35)":B.border}`,cursor:"pointer",marginBottom:5,transition:"all .15s"}}>
                <div style={{flex:1,fontSize:11,color:B.muted,lineHeight:1.3}}>{ind.name}</div>
                <div style={{fontSize:12,fontWeight:600,fontFamily:"DM Mono",color:ind.sel&&g.active?B.blue:B.muted,margin:"0 6px"}}>{ind.val}</div>
                <div style={{width:15,height:15,borderRadius:4,border:`1px solid ${ind.sel&&g.active?B.blue:B.border}`,background:ind.sel&&g.active?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {ind.sel&&g.active&&<svg viewBox="0 0 10 10" fill="none" stroke="#fff" strokeWidth="2" style={{width:8,height:8}}><polyline points="1,5 4,8 9,2"/></svg>}
                </div>
              </div>
            ))}
            <div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",marginTop:6,letterSpacing:".5px"}}>CLICK PARA SELECCIONAR · MÁX. 3</div>
          </div>
        ))}
      </div>
      {ai.show&&<AIPanel loading={ai.loading} text={ai.text}/>}
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <button style={btn(true)} onClick={handleAnalyze}>Analizar mix con IA ↗</button>
      </div>
    </div>
  );
}

    return MODULES_DEF;
  });

    const s=loadStore();
    if(s?.gaas) return GAAS_DEF.map(def=>{const sv=s.gaas.find(g=>g.id===def.id);return sv?{...def,...sv}:def;});

          </div>
        </div>

          <div style={{fontFamily:"DM Mono",fontSize:10,color:B.muted}}><span style={{color:B.blue,fontWeight:600}}>{globalProgress}%</span> global</div>
          <Badge>{settings.empresa}</Badge>
          <button onClick={()=>setShowSettings(true)} title="Configuración" style={{width:30,height:30,borderRadius:6,background:"transparent",border:`0.5px solid ${B.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B.muted}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:14,height:14}}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
          <button onClick={()=>exportPlan(modules,settings,gaas)} title="Exportar plan" style={{width:30,height:30,borderRadius:6,background:"transparent",border:`0.5px solid ${B.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B.muted}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:14,height:14}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button onClick={()=>{if(confirm("¿Resetear todos los datos? Esta acción no se puede deshacer.")){{clearStore();window.location.reload();}}}} title="Reset datos" style={{width:30,height:30,borderRadius:6,background:"transparent",border:`0.5px solid rgba(239,83,80,.3)`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B.red}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:14,height:14}}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </button>
        </div>
      </div>

      <div style={{display:"flex",flex:1}}>
        {/* ── SIDEBAR ── */}
        <div style={{width:215,background:B.bg2,borderRight:`0.5px solid ${B.border}`,padding:"1rem 0.75rem",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
          {/* MESA chain */}
          <div style={{display:"flex",gap:3,marginBottom:16,padding:"10px 8px",background:B.bg3,borderRadius:8,border:`0.5px solid ${B.border}`}}>
            {[{l:"M",n:"Mapear"},{l:"E",n:"Estructurar"},{l:"S",n:"Sistematizar"},{l:"A",n:"Escalar"},{l:"+",n:"Autonomizar"}].map((p,i)=>(
              <div key={i} style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:9,fontFamily:"DM Mono",color:B.blue,fontWeight:600,letterSpacing:".5px"}}>{p.l}</div>
                <div style={{fontSize:7,color:B.muted,marginTop:1,lineHeight:1.2,overflow:"hidden"}}>{p.n}</div>
              </div>
            ))}
          </div>

          <div style={{fontSize:9,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:B.border,marginBottom:6,fontFamily:"DM Mono"}}>Navegación</div>
          {[{id:"dashboard",label:"Dashboard General"},{id:"gaas",label:"Servicios GaaS"}].map(n=>(
            <button key={n.id} style={navBtn(view===n.id)} onClick={()=>setView(n.id)}>
              <div style={{width:5,height:5,borderRadius:"50%",background:view===n.id?B.blue:B.muted,flexShrink:0}}/>
              {n.label}
            </button>
          ))}

          <div style={{fontSize:9,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:B.border,margin:"16px 0 6px",fontFamily:"DM Mono"}}>Módulos MESA</div>
          {modules.map(m=>{
            const prog=m.progress||0;
            const isActive=view===m.id;
            const locked=!m.unlocked;
            return(
              <button key={m.id} style={{...navBtn(isActive),opacity:locked?.7:1}} onClick={()=>setView(m.id)}>
                <div style={{width:5,height:5,borderRadius:"50%",background:isActive?B.blue:prog>0?"rgba(33,150,243,.5)":B.border,flexShrink:0}}/>
                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.id.toUpperCase()} · {m.name}</span>
                {locked
                  ?<span style={{fontSize:10,flexShrink:0}}>🔒</span>
                  :<span style={{fontSize:10,fontFamily:"DM Mono",color:prog>0?B.blue:B.border,flexShrink:0}}>{prog}%</span>
                }
              </button>
            );
          })}

          {/* Tagline + info guardado */}
          <div style={{marginTop:"auto",paddingTop:16,borderTop:`0.5px solid ${B.border}`}}>
            <div style={{fontSize:10,color:B.border,fontFamily:"DM Mono",lineHeight:1.5,letterSpacing:".3px",marginBottom:8}}>
              "La improvisación no escala.<br/>La gestión sí."
            </div>
            {settings._saved&&(
              <div style={{fontSize:9,color:B.border,fontFamily:"DM Mono"}}>
                Guardado: {new Date(settings._saved||Date.now()).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}
              </div>
            )}
          </div>
        </div>

        {/* ── MAIN CONTENT ── */}
        <div style={{flex:1,overflowY:"auto",padding:"2rem 1.75rem",minWidth:0,background:B.bg1,position:"relative"}}>
          <div style={{position:"fixed",inset:0,backgroundImage:"radial-gradient(circle,rgba(33,150,243,.05) 1px,transparent 1px)",backgroundSize:"32px 32px",pointerEvents:"none",zIndex:0}}/>
          <div style={{position:"relative",zIndex:1}}>
            {view==="dashboard"&&<Dashboard modules={modules} gaas={gaas} onNav={setView} settings={settings} healthHistory={healthHistory} setHealthHistory={setHealthHistory} addToast={addToast} apiKey={settings.apiKey} addEvent={addEvent}/>}
            {view==="gaas"&&<GaaSView gaas={gaas} setGaas={setGaas} apiKey={settings.apiKey} addToast={addToast}/>}
            {currentMod&&<ModuleView mod={currentMod} modules={modules} setModules={setModules} apiKey={settings.apiKey} addToast={addToast} addEvent={addEvent}/>}
          </div>
        </div>
      </div>

      {/* ── MODALES Y OVERLAYS ── */}
      {showSettings&&<SettingsModal settings={settings} onSave={saveSettings} onClose={()=>setShowSettings(false)}/>}

      {/* ── TOAST STACK ── */}
      <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8}}>
        {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>removeToast(t.id)}/>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
